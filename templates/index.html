<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnomalyCraft Survival 2D</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0f; color:#e0e0e0; font-family:'Inter',sans-serif; display:flex; height:100vh; overflow:hidden; font-size:14px; }
        
        /* Left: Game Canvas */
        .game-panel { flex:0 0 768px; padding:12px; display:flex; flex-direction:column; gap:8px; position:relative; }
        .game-title { font-family:'Press Start 2P',monospace; font-size:18px; background:linear-gradient(90deg,#ff8a00,#e52e71,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#ccc; flex-wrap:wrap; gap:4px; }
        .top-bar .badge { padding:4px 12px; border-radius:4px; font-size:12px; font-weight:700; }
        .badge-day { background:#2d4a1e; color:#7dff4a; }
        .badge-night { background:#1a1a3a; color:#a78bfa; }
        .badge-season { background:#1e293b; color:#60a5fa; }
        .badge-weather { background:#1e293b; color:#fbbf24; }
        .badge-pop { background:#1e1e2e; color:#f472b6; }
        
        .canvas-container { position:relative; border-radius:8px; overflow:hidden; border:2px solid #222; box-shadow:0 0 20px rgba(0,0,0,0.5); cursor:grab; }
        .canvas-container:active { cursor:grabbing; }
        canvas { image-rendering:pixelated; display:block; }
        
        .controls { position:absolute; bottom:10px; right:10px; display:flex; gap:4px; }
        .control-btn { padding:8px 12px; background:#1a1a2e; border:1px solid #333; border-radius:4px; color:#fff; font-size:12px; cursor:pointer; font-weight:700; }
        .control-btn:hover { background:#2a2a3e; }
        
        .tooltip { position:absolute; background:rgba(0,0,0,0.9); color:#fff; padding:8px 12px; border-radius:4px; font-size:12px; pointer-events:none; display:none; z-index:1000; border:1px solid #444; }

        /* Right: HUD */
        .hud-panel { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
        .hud-panel::-webkit-scrollbar { width:4px; }
        .hud-panel::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }

        .section-title { font-family:'Press Start 2P',monospace; font-size:12px; color:#aaa; margin-bottom:8px; letter-spacing:1px; }

        /* Agent Cards */
        .agent-card { background:#12121a; border:1px solid #1e1e2e; border-radius:6px; padding:10px; font-size:12px; transition:border-color .2s; cursor:pointer; }
        .agent-card:hover { border-color:#8b5cf6; }
        .agent-card.dead { opacity:.4; }
        .agent-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .agent-name { font-weight:700; font-size:13px; }
        .agent-meta { font-size:10px; color:#666; }
        .bars { display:flex; flex-direction:column; gap:4px; margin:6px 0; }
        .bar-row { display:flex; align-items:center; gap:6px; font-size:10px; color:#888; }
        .bar-label { width:40px; text-align:right; }
        .bar-track { flex:1; height:8px; background:#1e1e2e; border-radius:4px; overflow:hidden; }
        .bar-fill { height:100%; border-radius:4px; transition:width .3s; }
        .bar-hp { background:linear-gradient(90deg,#ef4444,#f87171); }
        .bar-en { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
        .bar-hu { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
        .inv-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
        .inv-tag { background:#1a1a2e; padding:2px 6px; border-radius:4px; font-size:10px; border:1px solid #252540; }

        /* Communities */
        .comm-card { background:#12121a; border:1px solid #1e1e2e; border-radius:6px; padding:10px; font-size:12px; }
        .comm-name { font-weight:700; color:#a78bfa; }

        /* Event Log */
        .event-log { background:#0d0d14; border:1px solid #1e1e2e; border-radius:6px; padding:8px; max-height:160px; overflow-y:auto; font-size:10px; color:#666; font-family:monospace; line-height:1.6; }
        .event-log::-webkit-scrollbar { width:3px; }
        .event-log::-webkit-scrollbar-thumb { background:#333; }

        /* Stats Row */
        .stats-row { display:flex; gap:8px; flex-wrap:wrap; }
        .stat-box { background:#12121a; border:1px solid #1e1e2e; border-radius:6px; padding:8px 12px; text-align:center; flex:1; min-width:80px; }
        .stat-val { font-size:24px; font-weight:700; color:#fff; font-family:'Press Start 2P',monospace; }
        .stat-lbl { font-size:9px; color:#666; margin-top:3px; }
    </style>
</head>
<body>
    <div class="game-panel">
        <div class="game-title">ANOMALYCRAFT SURVIVAL</div>
        <div class="top-bar">
            <span id="tick">Tick: 0</span>
            <span class="badge badge-day" id="daynight">DAY</span>
            <span class="badge badge-season" id="season">SPRING</span>
            <span class="badge badge-weather" id="weather">CLEAR</span>
            <span class="badge badge-pop" id="pop">Pop: 0</span>
            <span id="score">Score: 0</span>
        </div>
        <div class="top-bar" id="nn-bar" style="font-size:11px; color:#aef; background:#1a1a2e; padding:4px 12px; border-top:1px solid #333;">
            🧠 <b>AGENTS</b> &nbsp;
            <span id="nn-gen">Gen: 0</span> &nbsp;|&nbsp;
            🏆 <span id="nn-best">Best: 0 ticks</span> &nbsp;|&nbsp;
            🧬 <span id="nn-pool">Pool: 0</span> &nbsp;|&nbsp;
            🎲 <span id="nn-mut">Mut: 0.15</span> &nbsp;|&nbsp;
            📈 <span id="nn-trend">Trend: —</span>
            &nbsp;&nbsp;&nbsp;
            👾 <b>ANOMALIES</b> &nbsp;
            <span id="ano-gen">Gen: 0</span> &nbsp;|&nbsp;
            💀 <span id="ano-best">Best dmg: 0</span> &nbsp;|&nbsp;
            🧬 <span id="ano-pool">Pool: 0</span> &nbsp;|&nbsp;
            📈 <span id="ano-trend">Trend: —</span>
        </div>
        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas" width="768" height="768"></canvas>
            <div class="controls">
                <button class="control-btn" onclick="zoomIn()">🔍+</button>
                <button class="control-btn" onclick="zoomOut()">🔍−</button>
                <button class="control-btn" onclick="resetCamera()">⌖</button>
            </div>
        </div>
        <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="hud-panel" id="hud">
        <div class="stats-row" id="stats-row"></div>
        <div class="section-title">AGENTS</div>
        <div id="agents-list"></div>
        <div class="section-title" style="margin-top:8px;">COMMUNITIES</div>
        <div id="communities-list"></div>
        <div class="section-title" style="margin-top:8px;">EVENT LOG</div>
        <div class="event-log" id="event-log"></div>
        <div class="section-title" style="margin-top:8px; color:#4af;">🧠 TRAINING TERMINAL</div>
        <div id="train-terminal" style="
            background:#0a0a0f;
            border:1px solid #1a3a5a;
            border-radius:4px;
            padding:6px 8px;
            font-family:'Courier New',monospace;
            font-size:10px;
            color:#4af;
            height:220px;
            overflow-y:auto;
            white-space:pre-wrap;
            word-break:break-all;
        "></div>
    </div>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    const TILE_SIZE = 16; // Smaller tiles for larger world
    const BIOME_COLORS = {
        plains:'#4a7c3f', forest:'#2d5a1e', desert:'#c2a64e',
        mountain:'#7a7a7a', swamp:'#3a5c3a'
    };
    const AGENT_COLORS = [
        '#3498db','#e74c3c','#2ecc71','#f1c40f','#e67e22','#9b59b6',
        '#1abc9c','#e84393','#00cec9','#fdcb6e','#6c5ce7','#ff7675'
    ];

    let S = null;
    let camera = {x: 0, y: 0, zoom: 1};
    let isDragging = false;
    let dragStart = {x: 0, y: 0};
    let selectedAgent = null;

    async function fetchState() {
        try {
            const res = await fetch('/survival/state');
            S = await res.json();
            draw();
            updateHUD();
        } catch(e) { console.error(e); }
    }

    function draw() {
        if (!S) return;
        const W = S.map_size.width, H = S.map_size.height;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        ctx.save();
        ctx.translate(-camera.x, -camera.y);
        ctx.scale(camera.zoom, camera.zoom);

        const tileSize = TILE_SIZE;

        // 1. Biomes
        for (const [coord, biome] of Object.entries(S.biome_map)) {
            const [x,y] = coord.split(',').map(Number);
            ctx.fillStyle = BIOME_COLORS[biome] || '#4a7c3f';
            ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
        }

        // Grid
        ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
        for(let i=0;i<=W;i++){ ctx.beginPath(); ctx.moveTo(i*tileSize,0); ctx.lineTo(i*tileSize,H*tileSize); ctx.stroke(); }
        for(let i=0;i<=H;i++){ ctx.beginPath(); ctx.moveTo(0,i*tileSize); ctx.lineTo(W*tileSize,i*tileSize); ctx.stroke(); }

        // 2. Buildings
        for (const b of S.buildings) {
            const bx = b.x*tileSize, by = b.y*tileSize;
            if (b.type === 'shelter') {
                ctx.fillStyle='#8B4513'; ctx.fillRect(bx+1,by+1,tileSize-2,tileSize-2);
                ctx.fillStyle='#A0522D'; ctx.fillRect(bx+2,by+tileSize*0.3,tileSize-4,tileSize*0.4);
            } else if (b.type === 'farm') {
                ctx.fillStyle='#556B2F'; ctx.fillRect(bx,by,tileSize,tileSize);
                ctx.strokeStyle='#6B8E23'; ctx.lineWidth=1; ctx.strokeRect(bx+1,by+1,tileSize-2,tileSize-2);
            } else if (b.type === 'wall') {
                ctx.fillStyle='#696969'; ctx.fillRect(bx,by,tileSize,tileSize);
            } else if (b.type === 'tower') {
                ctx.fillStyle='#2F4F4F'; ctx.fillRect(bx+2,by+2,tileSize-4,tileSize-4);
                ctx.fillStyle='#708090'; ctx.fillRect(bx+3,by+3,tileSize-6,tileSize*0.6);
            } else if (b.type === 'mine') {
                ctx.fillStyle='#000000'; ctx.fillRect(bx,by,tileSize,tileSize);
                ctx.fillStyle='#8B4513'; ctx.fillRect(bx+tileSize*0.2,by+tileSize*0.2,tileSize*0.6,tileSize*0.6);
            } else if (b.type === 'temple') {
                ctx.fillStyle='#FFD700'; ctx.fillRect(bx+1,by+1,tileSize-2,tileSize-2);
                ctx.fillStyle='#FFA500'; ctx.fillRect(bx+tileSize*0.3,by+tileSize*0.3,tileSize*0.4,tileSize*0.4);
            } else if (b.type === 'workshop') {
                ctx.fillStyle='#8B4513'; ctx.fillRect(bx,by,tileSize,tileSize);
                ctx.fillStyle='#A0522D'; ctx.fillRect(bx+tileSize*0.1,by+tileSize*0.1,tileSize*0.8,tileSize*0.8);
            } else if (b.type === 'market') {
                ctx.fillStyle='#DEB887'; ctx.fillRect(bx,by,tileSize,tileSize);
                ctx.strokeStyle='#D2691E'; ctx.lineWidth=2; ctx.strokeRect(bx+2,by+2,tileSize-4,tileSize-4);
            } else if (b.type === 'hospital') {
                ctx.fillStyle='#FFFFFF'; ctx.fillRect(bx,by,tileSize,tileSize);
                ctx.fillStyle='#FF0000'; ctx.fillRect(bx+tileSize*0.2,by+tileSize*0.2,tileSize*0.6,tileSize*0.6);
            } else if (b.type === 'campfire') {
                ctx.fillStyle='#8B0000'; ctx.fillRect(bx+tileSize*0.3,by+tileSize*0.3,tileSize*0.4,tileSize*0.4);
                ctx.fillStyle='#FFA500'; ctx.beginPath(); ctx.arc(bx+tileSize/2,by+tileSize/2,tileSize*0.2,0,Math.PI*2); ctx.fill();
            }
        }

        // 3. Resources
        for (const [coord, rtype] of Object.entries(S.global_resources)) {
            const [x,y] = coord.split(',').map(Number);
            const cx = x*tileSize + tileSize/2, cy = y*tileSize + tileSize/2;
            const size = tileSize * 0.4;
            
            ctx.fillStyle = getResourceColor(rtype);
            ctx.fillRect(cx-size/2,cy-size/2,size,size);
        }

        // 4. Anomalies
        for (const a of S.anomalies) {
            const ax = a.x*tileSize, ay = a.y*tileSize;
            const pulse = Math.sin(S.tick*0.3)*2;
            ctx.fillStyle = a.anomaly_type==='Void Storm' ? 'rgba(100,0,160,0.7)' : 'rgba(200,0,0,0.7)';
            ctx.beginPath(); ctx.arc(ax+tileSize/2,ay+tileSize/2,tileSize*0.5+pulse,0,Math.PI*2); ctx.fill();
        }

        // 5. Agents with RETRO PIXEL FACES
        let idx = 0;
        for (const [id, agent] of Object.entries(S.agents)) {
            if (!agent.alive) { idx++; continue; }
            const px = agent.x*tileSize, py = agent.y*tileSize;
            const col = AGENT_COLORS[idx % AGENT_COLORS.length];

            // Body (circle)
            ctx.fillStyle = col;
            ctx.beginPath(); ctx.arc(px+tileSize/2,py+tileSize/2,tileSize*0.35,0,Math.PI*2); ctx.fill();
            
            // RETRO PIXEL FACE
            const faceX = px + tileSize/2;
            const faceY = py + tileSize/2;
            
            // Determine emotion based on state
            let emotion = 'happy';
            const nearAnomaly = S.anomalies.some(a => 
                Math.abs(a.x - agent.x) <= 2 && Math.abs(a.y - agent.y) <= 2
            );
            
            if (nearAnomaly) emotion = 'scared';
            else if (agent.health < 30) emotion = 'hurt';
            else if (agent.hunger < 30) emotion = 'hungry';
            else if (agent.energy < 30) emotion = 'tired';
            
            // Eyes (2 pixels each)
            ctx.fillStyle = '#000';
            if (emotion === 'hurt') {
                // X eyes (hurt)
                ctx.fillRect(faceX-3, faceY-2, 2, 1);
                ctx.fillRect(faceX-2, faceY-1, 2, 1);
                ctx.fillRect(faceX+1, faceY-2, 2, 1);
                ctx.fillRect(faceX+2, faceY-1, 2, 1);
            } else if (emotion === 'scared') {
                // Wide eyes (scared)
                ctx.fillRect(faceX-4, faceY-3, 3, 3);
                ctx.fillRect(faceX+1, faceY-3, 3, 3);
            } else {
                // Normal eyes
                ctx.fillRect(faceX-3, faceY-2, 2, 2);
                ctx.fillRect(faceX+1, faceY-2, 2, 2);
            }
            
            // Mouth
            if (emotion === 'happy') {
                // Smile
                ctx.fillRect(faceX-2, faceY+2, 1, 1);
                ctx.fillRect(faceX-1, faceY+3, 3, 1);
                ctx.fillRect(faceX+2, faceY+2, 1, 1);
            } else if (emotion === 'hungry' || emotion === 'tired') {
                // Frown
                ctx.fillRect(faceX-2, faceY+3, 1, 1);
                ctx.fillRect(faceX-1, faceY+2, 3, 1);
                ctx.fillRect(faceX+2, faceY+3, 1, 1);
            } else if (emotion === 'hurt') {
                // O mouth (shocked)
                ctx.fillRect(faceX-1, faceY+2, 3, 1);
                ctx.fillRect(faceX-1, faceY+4, 3, 1);
                ctx.fillRect(faceX-2, faceY+3, 1, 1);
                ctx.fillRect(faceX+2, faceY+3, 1, 1);
            } else if (emotion === 'scared') {
                // O mouth (scared)
                ctx.fillRect(faceX-1, faceY+2, 3, 1);
                ctx.fillRect(faceX-1, faceY+5, 3, 1);
                ctx.fillRect(faceX-2, faceY+3, 1, 2);
                ctx.fillRect(faceX+2, faceY+3, 1, 2);
            }
            
            // DANGER INDICATOR (red exclamation mark above head)
            if (nearAnomaly) {
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(faceX, py-6, 1, 3);
                ctx.fillRect(faceX, py-2, 1, 1);
            }
            
            // HP bar
            ctx.fillStyle='#333'; ctx.fillRect(px+1,py-2,tileSize-2,2);
            ctx.fillStyle='#ef4444'; ctx.fillRect(px+1,py-2,(tileSize-2)*Math.max(0,agent.health)/100,2);
            
            // Selection highlight
            if (selectedAgent === id) {
                ctx.strokeStyle='#fff'; ctx.lineWidth=2;
                ctx.strokeRect(px,py,tileSize,tileSize);
            }
            idx++;
        }

        // 6. Night overlay
        if (!S.is_day) {
            ctx.fillStyle='rgba(5,5,30,0.6)'; ctx.fillRect(0,0,W*tileSize,H*tileSize);
        }
        if (S.weather === 'rain' || S.weather === 'snow') {
            ctx.fillStyle = S.weather==='rain' ? 'rgba(100,150,255,0.3)' : 'rgba(255,255,255,0.4)';
            for(let i=0;i<30;i++){
                const rx = (Math.sin(S.tick*0.7+i*13)*0.5+0.5)*W*tileSize;
                const ry = ((S.tick*3+i*17)%(H*tileSize));
                ctx.fillRect(rx,ry,1,S.weather==='rain'?4:2);
            }
        }

        ctx.restore();
    }

    function getResourceColor(rtype) {
        const colors = {
            wood:'#8B5E3C', stone:'#999', iron:'#B0C4DE', crystal:'#DA70D6', berry:'#DC143C', mushroom:'#DEB887',
            pickaxe:'#8B4513', axe:'#654321', sword:'#C0C0C0', shield:'#708090', bow:'#8B4513', arrow:'#654321',
            helmet:'#C0C0C0', chestplate:'#708090', boots:'#654321', iron_pickaxe:'#B0C4DE', iron_axe:'#4682B4',
            crystal_sword:'#DA70D6', crossbow:'#8B4513', iron_helmet:'#4682B4', iron_chestplate:'#4169E1', iron_boots:'#4682B4',
            void_stabilizer:'#9932CC', healing_potion:'#FF69B4', energy_elixir:'#00FF7F', trade_token:'#FFD700',
            teleport_scroll:'#8A2BE2', fire_starter:'#FF4500', fishing_rod:'#8B4513', campfire_kit:'#8B0000',
            cooked_meat:'#8B0000', bread:'#DEB887', stew:'#8B4513'
        };
        return colors[rtype] || '#fff';
    }

    // Camera controls
    function zoomIn() { camera.zoom = Math.min(3, camera.zoom * 1.2); }
    function zoomOut() { camera.zoom = Math.max(0.5, camera.zoom / 1.2); }
    function resetCamera() { camera = {x: 0, y: 0, zoom: 1}; }

    // Mouse controls
    const container = document.getElementById('canvasContainer');
    container.addEventListener('mousedown', e => {
        isDragging = true;
        dragStart = {x: e.clientX + camera.x, y: e.clientY + camera.y};
    });
    container.addEventListener('mousemove', e => {
        if (isDragging) {
            camera.x = dragStart.x - e.clientX;
            camera.y = dragStart.y - e.clientY;
        }
        // Tooltip
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left + camera.x) / camera.zoom;
        const my = (e.clientY - rect.top + camera.y) / camera.zoom;
        const tx = Math.floor(mx / TILE_SIZE);
        const ty = Math.floor(my / TILE_SIZE);
        showTooltip(e.clientX, e.clientY, tx, ty);
    });
    container.addEventListener('mouseup', () => { isDragging = false; });
    container.addEventListener('mouseleave', () => { isDragging = false; tooltip.style.display='none'; });
    
    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left + camera.x) / camera.zoom;
        const my = (e.clientY - rect.top + camera.y) / camera.zoom;
        const tx = Math.floor(mx / TILE_SIZE);
        const ty = Math.floor(my / TILE_SIZE);
        
        // Check if holding modifier keys for special actions
        if (e.shiftKey) {
            // SHIFT + Click = Spawn anomaly
            fetch('/survival/spawn_anomaly', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({x: tx, y: ty})
            });
            return;
        }
        
        if (e.ctrlKey || e.metaKey) {
            // CTRL/CMD + Click = Place resource
            const resourceType = prompt("Resource type (wood/stone/iron/crystal/berry/mushroom):", "wood");
            if (resourceType) {
                fetch('/survival/place_resource', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({x: tx, y: ty, resource_type: resourceType})
                });
            }
            return;
        }
        
        // Normal click - Select agent
        selectedAgent = null;
        for (const [id, agent] of Object.entries(S.agents || {})) {
            if (agent.alive && agent.x === tx && agent.y === ty) {
                selectedAgent = id;
                break;
            }
        }
    });

    function showTooltip(x, y, tx, ty) {
        if (!S) return;
        let text = `Tile: ${tx},${ty}`;
        
        // Check for agent
        for (const [id, agent] of Object.entries(S.agents || {})) {
            if (agent.alive && agent.x === tx && agent.y === ty) {
                text = `${id} | HP:${agent.health} EN:${agent.energy} HNG:${agent.hunger}`;
                break;
            }
        }
        
        // Check for resource
        const res = S.global_resources?.[`${tx},${ty}`];
        if (res) text += ` | ${res}`;
        
        // Check for building
        for (const b of S.buildings || []) {
            if (b.x === tx && b.y === ty) {
                text += ` | ${b.type}`;
                break;
            }
        }
        
        tooltip.textContent = text;
        tooltip.style.left = x + 10 + 'px';
        tooltip.style.top = y + 10 + 'px';
        tooltip.style.display = 'block';
    }

    function updateHUD() {
        if (!S) return;
        document.getElementById('tick').textContent = `Tick: ${S.tick}`;
        const dn = document.getElementById('daynight');
        dn.textContent = S.is_day ? '☀ DAY' : '🌙 NIGHT';
        dn.className = 'badge ' + (S.is_day ? 'badge-day' : 'badge-night');
        document.getElementById('season').textContent = S.season.toUpperCase();
        document.getElementById('weather').textContent = S.weather.toUpperCase();
        document.getElementById('pop').textContent = `Pop: ${S.total_population}`;
        
        // Show generation number if available
        const genText = S.generation_number ? ` | Gen ${S.generation_number}` : '';
        document.getElementById('score').textContent = `Score: ${S.score.toFixed(0)}${genText}`;

        document.getElementById('stats-row').innerHTML = `
            <div class="stat-box"><div class="stat-val">${S.total_population}</div><div class="stat-lbl">ALIVE</div></div>
            <div class="stat-box"><div class="stat-val">${S.total_born}</div><div class="stat-lbl">BORN</div></div>
            <div class="stat-box"><div class="stat-val">${S.total_died}</div><div class="stat-lbl">DIED</div></div>
            <div class="stat-box"><div class="stat-val">${Object.keys(S.communities).length}</div><div class="stat-lbl">TRIBES</div></div>
            <div class="stat-box"><div class="stat-val">${S.buildings.length}</div><div class="stat-lbl">BUILDS</div></div>
        `;

        let agentHtml = '';
        let idx = 0;
        const sorted = Object.entries(S.agents).sort((a,b) => b[1].alive - a[1].alive);
        for (const [id, a] of sorted) {
            const col = AGENT_COLORS[idx % AGENT_COLORS.length];
            const gen = a.generation > 0 ? ` (Gen ${a.generation})` : '';
            const comm = a.community_id && S.communities[a.community_id] ? S.communities[a.community_id].name : '—';
            
            // Personality emoji
            const personalityEmoji = {
                'aggressive': '⚔️',
                'peaceful': '☮️',
                'explorer': '🗺️',
                'builder': '🏗️'
            }[a.personality] || '👤';
            
            // Loved one indicator
            let loveInfo = '';
            if (a.loved_one && a.bond_strength > 0) {
                const hearts = a.bond_strength >= 0.8 ? '❤️❤️❤️' : a.bond_strength >= 0.5 ? '❤️❤️' : '❤️';
                loveInfo = `<div style="font-size:9px;color:#ff69b4;margin-top:2px;">${hearts} ${a.loved_one} (${(a.bond_strength*100).toFixed(0)}%)</div>`;
            }
            
            let inv = '';
            for (const [k,v] of Object.entries(a.inventory)) { if(v>0) inv += `<span class="inv-tag">${k}:${v}</span>`; }
            
            // Messages
            let msgs = '';
            if (a.messages && a.messages.length > 0) {
                msgs = '<div style="font-size:9px;color:#888;margin-top:4px;">💬 ' + a.messages[a.messages.length-1] + '</div>';
            }
            
            agentHtml += `<div class="agent-card ${a.alive?'':'dead'}" onclick="focusAgent('${id}')">
                <div class="agent-header">
                    <span class="agent-name" style="color:${col}">${personalityEmoji} ${id}${gen}</span>
                    <span class="agent-meta">Age ${a.age}/${a.max_age} | ${a.alive?'ALIVE':'DEAD'}</span>
                </div>
                <div class="agent-meta">Tribe: ${comm} | Kills: ${a.kills} | Crafted: ${a.items_crafted}</div>
                ${loveInfo}
                <div class="bars">
                    <div class="bar-row"><span class="bar-label">HP</span><div class="bar-track"><div class="bar-fill bar-hp" style="width:${Math.max(0,a.health)}%"></div></div><span>${a.health}</span></div>
                    <div class="bar-row"><span class="bar-label">EN</span><div class="bar-track"><div class="bar-fill bar-en" style="width:${Math.max(0,a.energy)}%"></div></div><span>${a.energy}</span></div>
                    <div class="bar-row"><span class="bar-label">HNG</span><div class="bar-track"><div class="bar-fill bar-hu" style="width:${Math.max(0,a.hunger)}%"></div></div><span>${a.hunger}</span></div>
                </div>
                <div class="inv-row">${inv || '<span class="inv-tag" style="color:#555">empty</span>'}</div>
                ${msgs}
            </div>`;
            idx++;
        }
        document.getElementById('agents-list').innerHTML = agentHtml;

        let commHtml = '';
        for (const [cid, c] of Object.entries(S.communities)) {
            if (c.members.length === 0) continue;
            let shared = '';
            for (const [k,v] of Object.entries(c.shared_resources)) { if(v>0) shared += `<span class="inv-tag">${k}:${v}</span>`; }
            commHtml += `<div class="comm-card">
                <span class="comm-name">${c.name}</span> <span class="agent-meta">(${c.members.length} members)</span>
                <div class="inv-row" style="margin-top:6px">${shared || '<span class="inv-tag" style="color:#555">no shared</span>'}</div>
            </div>`;
        }
        document.getElementById('communities-list').innerHTML = commHtml || '<div style="font-size:11px;color:#555">No tribes yet</div>';

        const logEl = document.getElementById('event-log');
        logEl.innerHTML = (S.event_log || []).slice(-20).reverse().join('<br>');
    }

    function focusAgent(id) {
        const agent = S.agents[id];
        if (agent && agent.alive) {
            camera.x = agent.x * TILE_SIZE * camera.zoom - canvas.width / 2;
            camera.y = agent.y * TILE_SIZE * camera.zoom - canvas.height / 2;
            selectedAgent = id;
        }
    }

    setInterval(fetchState, 200);
    fetchState();

    // ── Neural network stats polling (every 2s) ──
    async function fetchNNStats() {
        try {
            const res = await fetch('/survival/nn_stats');
            const data = await res.json();
            const nn  = data.agents    || data;
            const ano = data.anomalies || {};
            const tr  = data.training  || {};

            // Agent stats
            document.getElementById('nn-gen').textContent  = `Gen: ${nn.generation}`;
            document.getElementById('nn-best').textContent = `Best: ${nn.best_fitness_ever} ticks`;
            document.getElementById('nn-pool').textContent = `Pool: ${nn.gene_pool_size}/20`;
            document.getElementById('nn-mut').textContent  = `Mut: ${nn.mutation_rate}`;
            const hist = nn.avg_fitness_history || [];
            if (hist.length >= 2) {
                const last = hist[hist.length - 1], prev = hist[hist.length - 2];
                const arrow = last > prev ? '↑' : last < prev ? '↓' : '→';
                const el = document.getElementById('nn-trend');
                el.textContent = `Trend: ${arrow} ${last}`;
                el.style.color = last > prev ? '#4f4' : last < prev ? '#f44' : '#aaa';
            } else if (hist.length === 1) {
                document.getElementById('nn-trend').textContent = `Trend: ${hist[0]}`;
            }

            // Anomaly stats
            if (ano.generation !== undefined) {
                document.getElementById('ano-gen').textContent  = `Gen: ${ano.generation}`;
                document.getElementById('ano-best').textContent = `Best dmg: ${ano.best_fitness_ever}`;
                document.getElementById('ano-pool').textContent = `Pool: ${ano.gene_pool_size}/20`;
                const ahist = ano.avg_fitness_history || [];
                if (ahist.length >= 2) {
                    const last = ahist[ahist.length - 1], prev = ahist[ahist.length - 2];
                    const arrow = last > prev ? '↑' : last < prev ? '↓' : '→';
                    const el = document.getElementById('ano-trend');
                    el.textContent = `Trend: ${arrow} ${last}`;
                    el.style.color = last > prev ? '#f84' : last < prev ? '#aaa' : '#aaa';
                } else if (ahist.length === 1) {
                    document.getElementById('ano-trend').textContent = `Trend: ${ahist[0]}`;
                }
            }
        } catch(e) {}
    }
    setInterval(fetchNNStats, 2000);
    fetchNNStats();

    // ── Training terminal log (every 1s) ──
    async function fetchTrainLog() {
        try {
            const res  = await fetch('/survival/train_log');
            const data = await res.json();
            const term = document.getElementById('train-terminal');
            if (!term) return;

            const s = data.stats || {};
            const header = `GEN ${s.generation||0}  tick=${s.tick||0}  alive=${s.alive||0}  shelters=${s.shelters||0}\n` +
                           `fitness=${(s.agent_fitness||0).toFixed(0)}  ano_dmg=${(s.ano_fitness||0).toFixed(1)}  mut=${(s.mutation_rate||0).toFixed(4)}\n` +
                           `─────────────────────────────────────────────────\n`;

            const genLines  = (data.gen_log  || []).join('\n');
            const tickLines = (data.tick_log || []).join('\n');
            const full = header + genLines + (genLines && tickLines ? '\n' : '') + tickLines;

            term.textContent = full;
            // Auto-scroll to bottom
            term.scrollTop = term.scrollHeight;
        } catch(e) {}
    }
    setInterval(fetchTrainLog, 1000);
    fetchTrainLog();
    </script>
</body>
</html>
